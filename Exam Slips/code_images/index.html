<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS-253 Code Images Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            background: #161b22;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            color: #58a6ff;
            margin-bottom: 10px;
        }
        .stats {
            color: #8b949e;
            font-size: 1.1rem;
        }
        .slip {
            background: #161b22;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #30363d;
        }
        .slip h2 {
            color: #58a6ff;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 15px;
        }
        .image-card {
            background: #0d1117;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #30363d;
        }
        .image-card h3 {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .image-card img {
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .image-card img:hover {
            transform: scale(1.02);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎨 CS-253 Code Images Gallery</h1>
        <p class="stats">90 Images | 30 Slips | VS Code Dark+ Theme</p>
    </header>

    <div id="gallery"></div>

    <div id="modal" class="modal" onclick="this.classList.remove('active')">
        <img id="modal-img" src="" alt="Full size">
    </div>

    <script>
        const slips = Array.from({length: 30}, (_, i) => i + 1);
        const gallery = document.getElementById('gallery');
        
        slips.forEach(slip => {
            const slipNum = String(slip).padStart(2, '0');
            const slipDiv = document.createElement('div');
            slipDiv.className = 'slip';
            slipDiv.innerHTML = `
                <h2>Slip ${slipNum}</h2>
                <div class="images">
                    <div class="image-card">
                        <h3>Q1 Option A (C)</h3>
                        <img src="Slip_${slipNum}/Slip_${slipNum}_Q1_OptionA.png" alt="Option A" onclick="showModal(this.src)">
                    </div>
                    <div class="image-card">
                        <h3>Q1 Option B (C)</h3>
                        <img src="Slip_${slipNum}/Slip_${slipNum}_Q1_OptionB.png" alt="Option B" onclick="showModal(this.src)">
                    </div>
                    <div class="image-card">
                        <h3>DBMS Solution (SQL)</h3>
                        <img src="Slip_${slipNum}/Slip_${slipNum}_DBMS_Solution.png" alt="DBMS" onclick="showModal(this.src)">
                    </div>
                </div>
            `;
            gallery.appendChild(slipDiv);
        });
        
        function showModal(src) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = src;
            modal.classList.add('active');
            event.stopPropagation();
        }
    </script>
</body>
</html>
