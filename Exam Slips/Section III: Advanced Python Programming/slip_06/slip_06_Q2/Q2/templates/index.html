<!DOCTYPE html>
<html>
<head>
    <title>Portfolio</title>
    <style>
        h1 { text-align: center; }
        .scrolling {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            background-color: #f0f0f0;
            padding: 10px;
        }
        .scrolling span {
            display: inline-block;
            padding-left: 100%;
            animation: scroll 10s linear infinite;
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <h1>Amit Dev (Your Name)</h1>
    
    <h2>Qualifications:</h2>
    <ul>
        <li>B.Sc. Computer Science - SPPU (2022)</li>
        <li>HSC - State Board (2019)</li>
        <li>SSC - State Board (2017)</li>
    </ul>
    
    <div class="scrolling">
        <span>Special Skill: Python Programming, Data Analysis, Web Development</span>
    </div>
</body>
</html>
